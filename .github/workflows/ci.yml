name: CI

on:
  workflow_dispatch:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install ${{ github.actor == 'dependabot[bot]' && '' || '--frozen-lockfile' }}

      - name: Type check
        run: bun x tsc --noEmit

      - name: Build UI
        run: bun run ui:build